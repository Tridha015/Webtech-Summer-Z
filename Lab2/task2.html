<html>
<head>
    <title>Student Information Form</title>
    <link rel="stylesheet" type="text/css" href="/Users/fabihalamisatridha/Desktop/webtech-summer-Z/Lab2/style2.css" />
</head>
<body>


    <div class="form-container">
        <form>
            <fieldset class="form-fieldset">
                <legend class="form-badge">Student Information</legend>

<table class="form-table">
<tr>
<td>
<label for="fullname">Full Name (Text)</label> <br>
    <input type="text" id="fullname" placeholder="Enter your full name">
        </td>
<td>
    <label for="email">Email Address</label> <br>
<input type="email" id="email" placeholder="your.email@example.com">
</td>
</tr>
<tr>
<td>
<label for="password">Password</label><br>
<input type="password" id="password" placeholder="Enter secure password">
</td>
<td>
    <label for="age">Age (Number)</label> <br>
<input type="number" id="age" placeholder="Enter your age">
</td>
</tr>
                
<tr>
<td>
<label for="date">Experiment Date</label><br>
    <input type="date" id="date" value="mm/dd/yyyy">
    </td>

<td>
<label for="phone">Phone Number (Tel)</label><br>
<input type="tel" id="phone" placeholder="+880 XXXX XXXXXX">
</td>
</tr>
</table>

<div class="button-container">
<button type="submit" class="btn-submit">SUBMIT</button>
<button type="reset" class="btn-clear">CLEAR</button>
</div>
</form>
</div>

</body>
</html>
