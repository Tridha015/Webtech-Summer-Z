<html>
<head>
    <title>Pental Shop</title>
    <link rel="stylesheet" type="text/css" href="/Users/fabihalamisatridha/Desktop/webtech-summer-Z/Lab 1/style1.css" />
</head>
<body>

    <h1>Welcome to Pental Shop</h1>

    <table>
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Pencils</td>
                <td>100</td>
                <td>In Stock</td>
            </tr>
            <tr>
                <td>Notebooks</td>
                <td>50</td>
                <td>Low Stock</td>
            </tr>
            <tr>
                <td>Markers</td>
                <td>15</td>
                <td>In Stock</td>
            </tr>
        </tbody>
    </table>

    <div class="box">
        <h2>Contact Information</h2>
        
        <form action="#" method="post">
            <div class="row">
                <label for="user">Name</label>
                <input type="text" id="user" name="user">
            </div>

            <div class="row">
                <label for="mail">Email</label>
                <input type="email" id="mail" name="mail">
            </div>

            <div class="row">
                <label for="msg">Message</label>
                <textarea id="msg" name="msg"></textarea>
            </div>

            <div class="btn-block">
                <button type="submit">Submit</button>
            </div>
        </form>
    </div>

</body>
</html>
